spring.application.name=facturacion

# MySQL (ajustá usuario y contraseña)
spring.datasource.url=jdbc:mysql://localhost:3306/facturacion?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC&characterEncoding=UTF-8
spring.datasource.username=root
# Preferí variable de entorno para no subir la clave al repo: MYSQL_PASSWORD
spring.datasource.password=${MYSQL_PASSWORD:}

# JPA: validar contra tablas ya creadas con sql/schema.sql
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.globally_quoted_identifiers=false
spring.jpa.open-in-view=false

# Datos iniciales (src/main/resources/data.sql)
spring.jpa.defer-datasource-initialization=true
spring.sql.init.mode=always

server.port=8080

# Swagger UI (springdoc): http://localhost:8080/swagger-ui/index.html
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/v3/api-docs
